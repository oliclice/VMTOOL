<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词表管理 - VM-TOOL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.0/dist/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">VM-TOOL</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/words">词表管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/stats">统计分析</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/import">数据导入</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/docs">API文档</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>词表管理</h1>
        
        <!-- 添加词条表单 -->
        <div class="card mb-4">
            <div class="card-header">
                添加词条
            </div>
            <div class="card-body">
                <form hx-post="/api/words" hx-target="#word-list" hx-swap="innerHTML">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="word">词</label>
                                <input type="text" class="form-control" id="word" name="word" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="code">编码</label>
                                <input type="text" class="form-control" id="code" name="code">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="weight">权重</label>
                                <input type="number" class="form-control" id="weight" name="weight" value="1.0" step="0.1">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group mt-4">
                                <button type="submit" class="btn btn-primary btn-block">添加</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="搜索词条" id="search-input">
                    <button class="btn btn-outline-secondary" type="button" hx-get="/api/search" hx-target="#word-list" hx-swap="innerHTML" hx-vals="javascript:{keyword: document.getElementById('search-input').value}">搜索</button>
                </div>
            </div>
        </div>

        <!-- 词表列表 -->
        <div class="card">
            <div class="card-header">
                词表列表
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>词</th>
                                <th>编码</th>
                                <th>权重</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="word-list">
                            {% for word in words %}
                            <tr>
                                <td>{{ word.word }}</td>
                                <td>{{ word.code }}</td>
                                <td>{{ word.weight }}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning">编辑</button>
                                    <button class="btn btn-sm btn-danger" hx-delete="/api/words/{{ word.word }}" hx-target="#word-list" hx-swap="innerHTML">删除</button>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white mt-5 py-4">
        <div class="container text-center">
            <p>VM-TOOL v2.0.0 - 现代化码表处理工具</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
